# ── Zentinull — Docker Compose ───────────────────────────────────────────────
# Quick start:
#   docker compose up              # API server + dashboard
#   docker compose run demo        # Seed demo data, then start (one-shot)
#   docker compose up --build      # Rebuild after code changes
#   docker compose exec api python serve.py status  # run CLI commands
#
# Services:
#   api       — FastAPI server on :8001 (hot-reload enabled)
#   dashboard — Streamlit dashboard on :8501
#   demo      — One-shot: seed demo data, confirm, then start API+dashboard
#
# Volumes:
#   ./data      → /app/data       (persist mesh database across restarts)
#   ./src       → /app/src        (hot-reload source code in dev)
#   ./scripts   → /app/scripts    (access seed & utility scripts)
#   ./export    → /app/export     (pipeline CSV output visibility)

services:

  api:
    build:
      context: .
      target: dev
    image: zentinull:dev
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./export:/app/export
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    env_file: .env
    # ── Auth env vars (set in .env, commented examples):
    # AD_PASSWORD, AD_SERVER, FG_API_KEY, FG_HOST, FG_PORT
    # ME_CLIENT_SECRET, SDP_CLIENT_SECRET, ZBX_TOKEN

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    command: ["uvicorn", "zentinull.api.server:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

  dashboard:
    build:
      context: .
      target: dev
    image: zentinull:dev
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./scripts:/app/scripts
    profiles:
      - all
    depends_on:
      api:
        condition: service_healthy
    command:
      [
        "streamlit", "run", "dashboard.py",
        "--server.port", "8501",
        "--server.address", "0.0.0.0",
        "--browser.serverAddress", "localhost",
        "--browser.gatherUsageStats", "false",
      ]

  demo:
    build:
      context: .
      target: dev
    image: zentinull:dev
    profiles:
      - demo
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
    command: ["python3", "scripts/seed_demo_data.py", "-f"]
